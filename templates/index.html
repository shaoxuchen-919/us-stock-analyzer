<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股财报四维分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.85; }
        .search-box {
            max-width: 600px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
            padding: 0 20px;
        }
        .search-box input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #0d47a1;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
        }
        .search-box input:focus { border-color: #1565c0; }
        .search-box button {
            padding: 14px 30px;
            background: #0d47a1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        .search-box button:hover { background: #1565c0; }
        .search-box button:disabled { background: #90a4ae; cursor: not-allowed; }
        .examples {
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 0 20px;
            text-align: center;
        }
        .examples span { font-size: 13px; color: #666; }
        .examples a {
            display: inline-block;
            margin: 4px;
            padding: 6px 14px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }
        .examples a:hover { background: #bbdefb; }
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: #666;
        }
        .loading .spinner {
            display: inline-block;
            width: 24px; height: 24px;
            border: 3px solid #e0e0e0;
            border-top-color: #0d47a1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: #ffebee;
            border: 1px solid #ef5350;
            border-radius: 8px;
            color: #c62828;
        }
        .result-container {
            max-width: 920px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 公司头 */
        .company-header {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .company-header h2 { font-size: 22px; color: #1a237e; margin-bottom: 8px; }
        .company-header .meta { font-size: 13px; color: #666; line-height: 1.8; }
        .company-header .edgar-link {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: #e8eaf6;
            color: #1a237e;
            border-radius: 6px;
            font-size: 13px;
            text-decoration: none;
        }
        .company-header .edgar-link:hover { background: #c5cae9; }

        /* 维度数据表卡 */
        .dim-table-card {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .dim-table-card .card-title {
            font-size: 17px;
            font-weight: 600;
            color: #1565c0;
            margin-bottom: 16px;
            padding-left: 10px;
            border-left: 4px solid #1976d2;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .data-table th {
            background: #e8eaf6;
            color: #1a237e;
            padding: 10px 12px;
            text-align: center;
            font-weight: 600;
            border-bottom: 2px solid #c5cae9;
        }
        .data-table th:first-child { text-align: left; }
        .data-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .data-table td:first-child {
            text-align: left;
            color: #555;
            font-weight: 500;
        }
        .data-table tr:hover td { background: #f5f7fa; }
        .tag-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 4px;
            vertical-align: middle;
        }
        .tag-focus { background: #e8f5e9; color: #2e7d32; }
        .tag-dispersed { background: #fff3e0; color: #e65100; }
        .tag-heavy { background: #fce4ec; color: #c62828; }
        .tag-light { background: #e0f7fa; color: #00695c; }

        /* 年度分析结论区域 */
        .conclusion-section {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .conclusion-section .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1565c0;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e8eaf6;
        }
        .conclusion-item {
            padding: 18px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .conclusion-item:last-child { border-bottom: none; }
        .conclusion-item .item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .conclusion-item .item-icon {
            font-size: 22px;
        }
        .conclusion-item .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #1565c0;
        }
        .conclusion-item .item-text {
            font-size: 14px;
            line-height: 2;
            color: #444;
            padding-left: 34px;
        }

        /* 生命周期 + 比率 */
        .lifecycle-box, .ratios-box {
            background: #fff;
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .sub-title {
            font-size: 15px;
            font-weight: 600;
            color: #1565c0;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid #1976d2;
        }
        .lc-text { font-size: 14px; line-height: 1.8; color: #444; }
        .ratios-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .ratio-item {
            padding: 8px 12px;
            background: #f5f7fa;
            border-radius: 4px;
            font-size: 13px;
        }
        .ratio-item .r-label { color: #666; }
        .ratio-item .r-val { color: #333; font-weight: 500; float: right; }
        .raw-text {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            color: #444;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .toggle-raw, .copy-btn {
            display: block;
            margin: 10px auto;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .toggle-raw { background: #e3f2fd; color: #0d47a1; }
        .toggle-raw:hover { background: #bbdefb; }
        .copy-btn { background: #0d47a1; color: #fff; }
        .copy-btn:hover { background: #1565c0; }
        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>美股财报四维分析</h1>
        <p>投资 / 筹资 / 经营 / 规模 — 四维度五年数据 + 年度分析结论</p>
    </div>

    <div class="search-box">
        <input type="text" id="tickerInput" placeholder="输入美股代码，如 AAPL、MSFT、GOOGL" autocomplete="off">
        <button id="analyzeBtn" onclick="doAnalyze()">分析</button>
    </div>

    <div class="examples">
        <span>试试：</span>
        <a onclick="quickFill('AAPL')">AAPL 苹果</a>
        <a onclick="quickFill('MSFT')">MSFT 微软</a>
        <a onclick="quickFill('GOOGL')">GOOGL 谷歌</a>
        <a onclick="quickFill('AMZN')">AMZN 亚马逊</a>
        <a onclick="quickFill('NVDA')">NVDA 英伟达</a>
        <a onclick="quickFill('TSLA')">TSLA 特斯拉</a>
        <a onclick="quickFill('META')">META Meta</a>
        <a onclick="quickFill('JPM')">JPM 摩根大通</a>
    </div>

    <div id="loadingArea" style="display:none;">
        <div class="loading"><div class="spinner"></div><br>正在获取财务数据并分析...</div>
    </div>
    <div id="errorArea" style="display:none;"></div>

    <div id="resultArea" style="display:none;">
        <div class="result-container">
            <div id="companyHeader"></div>
            <!-- 四个维度5年数据表 -->
            <div id="dimTables"></div>
            <!-- 年度分析结论 -->
            <div id="conclusionSection"></div>
            <!-- 生命周期 -->
            <div id="lifecycleBox"></div>
            <!-- 最新比率 -->
            <div id="ratiosBox"></div>
            <button class="toggle-raw" onclick="toggleRaw()">显示/隐藏纯文本报告</button>
            <div id="rawText" class="raw-text"></div>
            <button class="copy-btn" onclick="copyReport()">复制纯文本报告</button>
            <button class="pdf-btn" onclick="exportPDF()" style="margin-left: 10px; padding: 12px 24px; background: #d32f2f; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">导出PDF报告</button>
        </div>
    </div>

    <footer>数据来源: SEC EDGAR XBRL (官方10-K) | 市场比率: Yahoo Finance | 四维框架: 投资/筹资/经营/规模</footer>

    <script>
    const tickerInput = document.getElementById('tickerInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    tickerInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAnalyze(); });

    function quickFill(t) { tickerInput.value = t; doAnalyze(); }

    async function doAnalyze() {
        const ticker = tickerInput.value.trim().toUpperCase();
        if (!ticker) return;
        analyzeBtn.disabled = true;
        document.getElementById('loadingArea').style.display = 'block';
        document.getElementById('errorArea').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        try {
            const resp = await fetch('/api/analyze', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ticker})
            });
            const data = await resp.json();
            if (!data.success) { showError(data.error || '分析失败'); return; }
            renderResult(data);
        } catch(e) { showError('网络请求失败: ' + e.message); }
        finally { analyzeBtn.disabled = false; document.getElementById('loadingArea').style.display = 'none'; }
    }

    function showError(msg) {
        document.getElementById('errorArea').innerHTML = `<div class="error-box">${msg}</div>`;
        document.getElementById('errorArea').style.display = 'block';
    }

    function fmtB(val) { if (!val && val !== 0) return '-'; return (val/1e9).toFixed(2)+'亿美元'; }
    function fmtP(val) { if (!val && val !== 0) return '-%'; return val.toFixed(2)+'%'; }
    function fmtN(val) { if (!val && val !== 0) return '-'; return val.toFixed(2); }

    function renderResult(data) {
        const si = data.stock_info;
        const years = data.years;

        // 公司头
        document.getElementById('companyHeader').innerHTML = `
            <div class="company-header">
                <h2>${si.name} (${data.ticker})</h2>
                <div class="meta">行业: ${si.industry} | 板块: ${si.sector} | 国家: ${si.country}</div>
                <a class="edgar-link" href="${data.edgar_link}" target="_blank">SEC EDGAR 官方10-K核实</a>
            </div>`;

        // ===== 四维度5年数据表 =====
        const dimOrder = ['invest', 'fund', 'operate', 'scale'];
        let tablesHtml = '';
        for (const dk of dimOrder) {
            const dt = data.dim_tables[dk];
            let tableHtml = `<table class="data-table"><thead><tr><th>指标</th>`;
            for (const yr of years) tableHtml += `<th>${yr}</th>`;
            tableHtml += '</tr></thead><tbody>';

            for (const row of dt.rows) {
                tableHtml += '<tr>';
                tableHtml += `<td>${row.label}`;
                // 标签（聚焦型/分散型 / 轻资产/重资产）
                for (const yr of years) {
                    if (row.tags && row.tags[yr]) {
                        const tagClass = row.tags[yr].includes('聚焦') ? 'tag-focus' :
                                          row.tags[yr].includes('重资产') ? 'tag-heavy' : 'tag-light';
                        tableHtml += ` <span class="tag-badge ${tagClass}">${row.tags[yr]}</span>`;
                        break;
                    }
                }
                tableHtml += '</td>';
                for (const yr of years) {
                    let val = row.values[yr] || '-';
                    // ROE警告标记
                    let warn = '';
                    if (row.roe_note && row.roe_note[yr]) {
                        warn = ' ⚠';
                    }
                    tableHtml += `<td>${val}${warn}</td>`;
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</tbody></table>';

            tablesHtml += `
                <div class="dim-table-card">
                    <div class="card-title">${dt.title}</div>
                    ${tableHtml}
                </div>`;
        }
        document.getElementById('dimTables').innerHTML = tablesHtml;

        // ===== 年度分析结论 =====
        let conclusionHtml = `
            <div class="conclusion-section">
                <div class="section-title">年度分析结论</div>`;
        for (const ac of data.annual_conclusions) {
            conclusionHtml += `
                <div class="conclusion-item">
                    <div class="item-header">
                        <span class="item-icon">${ac.icon}</span>
                        <span class="item-title">${ac.title}</span>
                    </div>
                    <div class="item-text">${ac.text}</div>
                </div>`;
        }
        conclusionHtml += '</div>';
        document.getElementById('conclusionSection').innerHTML = conclusionHtml;

        // 生命周期
        document.getElementById('lifecycleBox').innerHTML = `
            <div class="lifecycle-box"><div class="sub-title">生命周期判断</div><div class="lc-text">${data.lifecycle}</div></div>`;

        // 最新比率
        let ratiosHtml = '';
        if (data.ratios && Object.keys(data.ratios).length > 0) {
            ratiosHtml = '<div class="ratios-box"><div class="sub-title">当前最新关键比率</div><div class="ratios-grid">';
            const rLabels = {
                roe:'ROE', gross_margin:'毛利率', operating_margin:'营业利润率',
                current_ratio:'流动比率', quick_ratio:'速动比率', debt_to_equity:'负债/权益比',
                revenue_growth:'营收增速', earnings_growth:'利润增速',
                dividend_yield:'股息率', payout_ratio:'派息率', beta:'Beta', pe_ratio:'PE(TTM)',
                price_to_book:'PB', enterprise_value:'企业价值'
            };
            const pctFields = ['roe','gross_margin','operating_margin','revenue_growth','earnings_growth','dividend_yield','payout_ratio'];
            for (const [k,v] of Object.entries(data.ratios)) {
                const label = rLabels[k] || k;
                let dv = v;
                if (typeof v === 'number' && pctFields.includes(k)) dv = (v*100).toFixed(2)+'%';
                else if (k === 'enterprise_value' && typeof v === 'number') dv = (v/1e9).toFixed(2)+'亿美元';
                ratiosHtml += `<div class="ratio-item"><span class="r-label">${label}</span><span class="r-val">${dv}</span></div>`;
            }
            ratiosHtml += '</div></div>';
        }
        document.getElementById('ratiosBox').innerHTML = ratiosHtml;

        document.getElementById('rawText').innerText = data.report_text;
        document.getElementById('resultArea').style.display = 'block';
    }

    function toggleRaw() {
        const el = document.getElementById('rawText');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }
    function copyReport() {
        navigator.clipboard.writeText(document.getElementById('rawText').innerText).then(() => alert('报告已复制到剪贴板'));
    }
    async function exportPDF() {
        const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
        if (!ticker) {
            alert('请先输入股票代码并分析');
            return;
        }
        
        // 禁用按钮，显示加载状态
        const pdfBtn = document.querySelector('.pdf-btn');
        const originalText = pdfBtn.textContent;
        pdfBtn.textContent = '正在生成PDF...';
        pdfBtn.disabled = true;
        
        try {
            const response = await fetch('/api/export-pdf', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ticker})
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'PDF生成失败');
            }
            
            // 下载PDF文件
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${ticker}_analysis_report.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
            
        } catch (e) {
            alert('PDF导出失败: ' + e.message);
        } finally {
            // 恢复按钮状态
            pdfBtn.textContent = originalText;
            pdfBtn.disabled = false;
        }
    }
    </script>
</body>
</html>
